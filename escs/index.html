<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Is the shift over?</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.4/dist/confetti.browser.min.js"></script>

  <style>
    :root {
      --bg1: #6a11cb;
      --bg2: #2575fc;
      --yes: #22c55e;
      --no: #f59e0b;
      --weekend: #ec4899;
    }
    * {box-sizing: border-box}
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: 'Fredoka', sans-serif;
      background: linear-gradient(-45deg, var(--bg1), var(--bg2), #00c6ff, #7f53ac);
      background-size: 400% 400%;
      animation: bgMove 15s ease infinite;
    }
    @keyframes bgMove {
      0% {background-position: 0% 50%}
      50% {background-position: 100% 50%}
      100% {background-position: 0% 50%}
    }
    .card {
      width: min(95vw, 1000px);
      text-align: center;
      padding: 50px;
      border-radius: 40px;
      backdrop-filter: blur(18px);
      background: rgba(255, 255, 255, .15);
      box-shadow: 0 20px 60px rgba(0, 0, 0, .25);
      color: white;
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% {transform: translateY(0)}
      50% {transform: translateY(-12px)}
    }
    .headline {
      font-size: clamp(5rem, 18vw, 12rem);
      margin: 0;
      text-shadow: 0 6px 20px rgba(0, 0, 0, .3);
    }
    .sub {
      font-size: clamp(1.2rem, 2vw, 2rem);
    }
    .day, .footer {
      margin-top: 15px;
      font-size: 1.1rem;
      opacity: .9;
    }
    .emoji {
      font-size: 4rem;
      display: block;
      animation: spin 8s linear infinite;
    }
    @keyframes spin {
      from {transform: rotate(0deg)}
      to {transform: rotate(360deg)}
    }
    .confetti {
      position: fixed;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      animation: fall linear forwards;
      top: -12px;
    }
    @keyframes fall {
      from {transform: translateY(-12px)}
      to {transform: translateY(110vh)}
    }
  </style>
</head>
<body>
<div class="card" id="card">
  <span class="emoji" id="emoji">⏳</span>
  <h1 class="headline" id="headline">...</h1>
  <p class="sub" id="sub"></p>
  <div class="day" id="day" style="display:none"></div>
  <div class="footer" id="footer"></div>
</div>

<script>
  function fmt(mins) {
    let h = Math.floor(mins / 60), m = mins % 60;
    return (h ? `${h}h ` : '') + `${m}m`;
  }

  const friday = [
    '🔥 The workday is over. Let\'s go to happy hour! 🍻',
    '🍻 Time to forget about Teams, Outlook, and any meetings!',
    '🍻 Time to close the laptop and disappear until Monday!',
    '🍺 Enjoy the weekend. Emails can wait until Monday.',
  ];
  const weekend = [
    '🍹 Weekend mode activated',
    '😎 Your keyboard misses you already',
    '🎉 Time to ignore work notifications',
  ];
  const yes = [
    '🚀 Freedom started {time} ago!',
    '🍻 You\'ve been off for {time}. Celebrate responsibly.',
    '🎮 {time} of guilt-free procrastination.',
  ];
  const no = [
    '☕ Only {time} left. Keep pretending!',
    '💪 {time} until liberation.',
    '🎖️ You can survive, champ. {time} eft.',
  ];

  const weekend_footer = [
    '🍹 Enjoy your weekend!',
    '😎 Clocked out. Mission accomplished.',
    '🎉 Monday is a problem for your future self.',
    '🚫 Out of Office mode activated.',
  ];

  var party_count = 200;
  var party_defaults = {
    origin: { y: 0.7 },
  };

  function pick(a) {return a[Math.floor(Math.random() * a.length)];}

  function fire(particleRatio, opts) {
    confetti({
      ...party_defaults,
      ...opts,
      particleCount: Math.floor(party_count * particleRatio),
    });
  }

  function confettis() {
    fire(0.25, {
      spread: 26,
      startVelocity: 55,
    });
    fire(0.2, {
      spread: 60,
    });
    fire(0.35, {
      spread: 100,
      decay: 0.91,
      scalar: 0.8,
    });
    fire(0.1, {
      spread: 120,
      startVelocity: 25,
      decay: 0.92,
      scalar: 1.2,
    });
    fire(0.1, {
      spread: 120,
      startVelocity: 45,
    });
  }

  function render() {
    const now = new Date();
    const day = now.getDay();
    const mins = now.getHours() * 60 + now.getMinutes();
    const end = day != 5 ? (17 * 60) : 16 * 60;

    document.getElementById('day').textContent = now.toLocaleDateString(undefined, { weekday: 'long' });

    let headline, sub, emoji, footer;

    if (day === 0 || day === 6) {
      headline = 'WEEKEND!';
      sub = pick(weekend);
      emoji = '🎉';
      footer = 'Monday cannot hurt you here.';
      confettis();
    } else if (day === 5 && mins >= end) { // Friday after 5pm
      headline = '#IT'S FRIDAY!';
      sub = pick(friday);
      emoji = '🎉';
      footer = pick(weekend_footer);
      setTimeout(confettis, 300);
      setTimeout(confettis, 600);

    } else if (mins >= end) {
      headline = 'YES!';
      sub = pick(yes).replace('{time}', fmt(mins - end));
      emoji = '🍻';
      footer = 'Clocked out. Mission accomplished.';
      confettis();
    } else {
      headline = 'NO 😭';
      sub = pick(no).replace('{time}', fmt(end - mins));
      emoji = '⏳';
      footer = 'Keep calm and refresh later.';
    }

    headlineEl.textContent = headline;
    subEl.textContent = sub;
    emojiEl.textContent = emoji;
    footerEl.textContent = footer;
  }

  const headlineEl = document.getElementById('headline');
  const subEl = document.getElementById('sub');
  const emojiEl = document.getElementById('emoji');
  const footerEl = document.getElementById('footer');

  render();
  setInterval(render, 30000);
</script>
</body>
</html>
